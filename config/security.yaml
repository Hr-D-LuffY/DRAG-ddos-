security:
  enable_attack: false
  poisoning_ratio: 0.2  # % of malicious peers
  attack_strategy: 'random'  # 'random', 'data_rich', 'high_degree', 'replica_aware'
  poison_type: 'answer_swap'
  target_peer_ids: []  # Specifically target peer
  amplification_factor: 3  # copies of each poison
  question_variants: 2  # question variants

  # Knowledge Base Extraction Attack
  enable_extraction: true
  extraction_attacker_peer: null  # null = random selection
  extraction_queries_per_topic: 5  # Keep low for efficiency
  extraction_attack_type: 'external'  # 'external' or 'insider'
  extraction_use_topic_inference: false
  extraction_use_dataset_questions: true  # NEW - Use dataset questions (RECOMMENDED)


  # Membership Inference Attack
  enable_membership_inference: false
  mia_inference_method: 'confidence_based'
  mia_test_size: 0.3
  mia_threshold_percentile: 50
  mia_random_seed: 42